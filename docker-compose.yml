services:
  config-init:
    image: alpine:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /data/config.toml << EOF
        password_secret = "${PASSWORD_SECRET}"
        content_secret = "${CONTENT_SECRET}"

        [public_info]
        name = "hikabooru"
        default_user_rank = "regular"

        [public_info.privileges]
        # --- users ---
        user_create_self = "anonymous"
        user_list = "regular"
        user_view = "regular"
        user_edit_self_name = "regular"
        user_edit_self_pass = "regular"
        user_edit_self_email = "regular"
        user_edit_self_avatar = "regular"
        user_delete_self = "regular"
        # --- user tokens ---
        user_token_list_self = "regular"
        user_token_create_self = "regular"
        user_token_edit_self = "regular"
        user_token_delete_self = "regular"
        # --- posts ---
        post_create_anonymous = "regular"
        post_create_identified = "regular"
        post_list = "anonymous"
        post_view = "anonymous"
        post_view_featured = "anonymous"
        post_edit_tag = "regular"
        post_edit_source = "regular"
        post_edit_relation = "regular"
        post_edit_note = "regular"
        post_edit_flag = "regular"
        post_edit_description = "regular"
        post_edit_safety = "power"
        post_edit_thumbnail = "power"
        post_score = "regular"
        post_favorite = "regular"
        post_delete = "power"
        post_bulk_edit_tag = "power"
        post_bulk_edit_safety = "power"
        post_reverse_search = "regular"
        # --- tags ---
        tag_create = "regular"
        tag_list = "anonymous"
        tag_view = "anonymous"
        tag_edit_name = "power"
        tag_edit_category = "power"
        tag_edit_description = "power"
        tag_edit_implication = "power"
        tag_edit_suggestion = "power"
        tag_delete = "power"
        # --- tag categories ---
        tag_category_list = "anonymous"
        tag_category_view = "anonymous"
        # --- comments ---
        comment_create = "regular"
        comment_list = "anonymous"
        comment_view = "anonymous"
        comment_score = "regular"
        comment_edit_own = "regular"
        comment_delete_own = "regular"
        # --- pools ---
        pool_create = "regular"
        pool_list = "anonymous"
        pool_view = "anonymous"
        pool_edit_post = "power"
        pool_delete = "power"
        # --- pool categories ---
        pool_category_list = "anonymous"
        pool_category_view = "anonymous"
        # --- snapshots ---
        snapshot_list = "power"
        # --- uploads ---
        upload_create = "regular"
        EOF
        chown 1000:1000 /data/config.toml
        echo "Config written"
    volumes:
      - oxi_data:/data
    restart: "no"

  server:
    image: oxibooru/server:0.7
    depends_on:
      sql:
        condition: service_started
      config-init:
        condition: service_completed_successfully
    command: ["--config-path=/data/config.toml"]
    environment:
      POSTGRES_HOST: sql
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: "${POSTGRES_PORT}"
    volumes:
      - oxi_data:/data
    stop_signal: SIGINT

  client:
    image: oxibooru/client:0.7
    depends_on:
      - server
    environment:
      BACKEND_HOST: server
      BASE_URL: /
    volumes:
      - oxi_data:/data:ro

  sql:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - oxi_sql:/var/lib/postgresql/data

volumes:
  oxi_data:
  oxi_sql:
